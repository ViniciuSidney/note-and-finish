<!--
  Componente: Input
  Uso: campos de entrada simples, busca, seleção e texto longo.
-->

<input
  class="input"
  type="text"
  placeholder="Campo de texto"
/>

<input
  class="input"
  type="search"
  placeholder="Pesquisar..."
/>

<input
  class="input input-error"
  type="text"
  placeholder="Campo com erro"
/>

<input
  class="input input-success"
  type="text"
  placeholder="Campo válido"
/>

<textarea
  class="textarea"
  placeholder="Campo de texto longo"
></textarea>

<select class="select">
  <option value="">Selecione uma opção</option>
  <option value="opcao-1">Opção 1</option>
  <option value="opcao-2">Opção 2</option>
</select>

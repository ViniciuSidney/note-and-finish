<!--
  Componente: Card
  Uso: representar itens, módulos, registros, atalhos ou conteúdos resumidos.
-->

<article class="card">
  <header class="card-header">
    <div>
      <h3 class="card-title">Título do Card</h3>
      <p class="card-description">
        Descrição curta do item apresentado neste card.
      </p>
    </div>

    <span class="badge badge-primary">Status</span>
  </header>

  <div class="card-body">
    <p class="card-description">
      Conteúdo principal do card. Pode ser uma explicação, resumo ou informação importante.
    </p>

    <div class="card-meta">
      <span>Categoria</span>
      <span>•</span>
      <span>Data</span>
    </div>
  </div>

  <footer class="card-footer">
    <button class="btn btn-secondary btn-sm" type="button">
      Abrir
    </button>

    <div class="card-actions">
      <button class="btn btn-ghost btn-sm" type="button">
        Editar
      </button>

      <button class="btn btn-ghost btn-sm" type="button">
        Excluir
      </button>
    </div>
  </footer>
</article>

<!-- Card clicável -->

<article class="card card-clickable">
  <header class="card-header">
    <h3 class="card-title">Card Clicável</h3>
  </header>

  <p class="card-description">
    Use esta variação quando o card inteiro puder ser selecionado ou aberto.
  </p>
</article>

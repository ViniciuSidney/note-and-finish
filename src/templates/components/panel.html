<!--
  Componente: Panel
  Uso: agrupar conteúdos, seções, laterais, resumos e áreas de apoio.
-->

<section class="panel">
  <header class="panel-header">
    <div>
      <h2 class="panel-title">Título do Painel</h2>
      <p class="panel-description">
        Descrição curta explicando a função deste painel.
      </p>
    </div>

    <button class="btn btn-ghost btn-sm" type="button">
      Ação
    </button>
  </header>

  <div class="panel-body">
    <p>
      Conteúdo principal do painel. Pode ser uma lista, formulário, resumo, gráfico ou qualquer bloco de apoio.
    </p>
  </div>

  <footer class="panel-footer">
    <button class="btn btn-secondary btn-sm" type="button">
      Cancelar
    </button>

    <button class="btn btn-primary btn-sm" type="button">
      Confirmar
    </button>
  </footer>
</section>

<!-- Painel centralizado -->

<section class="panel panel-center">
  <div>
    <h2 class="panel-title">Conteúdo Centralizado</h2>
    <p class="panel-description">
      Use esta variação para estados vazios, mensagens ou destaques.
    </p>
  </div>
</section>

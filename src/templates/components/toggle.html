<!--
  Componente: Toggle / Switch
  Uso: ativar/desativar configurações, preferências e opções booleanas.
-->

<label class="switch">
	<input class="switch-input" type="checkbox" />

	<span class="switch-track" aria-hidden="true">
		<span class="switch-thumb"></span>
	</span>

	<span class="switch-label"> Ativar opção </span>
</label>

<!-- Toggle marcado -->

<label class="switch">
	<input class="switch-input" type="checkbox" checked />

	<span class="switch-track" aria-hidden="true">
		<span class="switch-thumb"></span>
	</span>

	<span class="switch-label"> Opção ativada </span>
</label>

<!-- Toggle desativado -->

<label class="switch">
	<input class="switch-input" type="checkbox" disabled />

	<span class="switch-track" aria-hidden="true">
		<span class="switch-thumb"></span>
	</span>

	<span class="switch-label"> Opção indisponível </span>
</label>

<!--
  Componente: Alert
  Uso: mensagens de sucesso, erro, aviso ou informação.
-->

<div class="alert alert-info" role="alert">
  <div>
    <h3 class="alert-title">Informação</h3>
    <p class="alert-text">
      Esta é uma mensagem informativa para orientar o usuário.
    </p>
  </div>
</div>

<div class="alert alert-success" role="alert">
  <div>
    <h3 class="alert-title">Sucesso</h3>
    <p class="alert-text">
      A ação foi concluída corretamente.
    </p>
  </div>
</div>

<div class="alert alert-warning" role="alert">
  <div>
    <h3 class="alert-title">Atenção</h3>
    <p class="alert-text">
      Verifique as informações antes de continuar.
    </p>
  </div>
</div>

<div class="alert alert-danger" role="alert">
  <div>
    <h3 class="alert-title">Erro</h3>
    <p class="alert-text">
      Algo deu errado. Revise os dados informados.
    </p>
  </div>
</div>

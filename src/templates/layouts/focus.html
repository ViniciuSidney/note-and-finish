<!--
  Layout: L13 - Focus Mode
  Uso: tela de foco, revisão, timer, leitura, resolução de questão ou execução de tarefa.
-->

<section class="layout-focus">
  <header class="focus-header">
    <div class="focus-title-group">
      <h1 class="focus-title">
        Modo Foco
      </h1>

      <p class="focus-subtitle">
        Concentre-se em uma ação principal por vez.
      </p>
    </div>

    <div class="focus-progress">
      <div class="focus-progress-label">
        <span>Progresso</span>
        <span>50%</span>
      </div>

      <div class="focus-progress-track" aria-label="Progresso da atividade">
        <div class="focus-progress-bar"></div>
      </div>
    </div>
  </header>

  <main class="focus-main">
    <div class="focus-content">
      <h2 class="focus-content-title">
        Conteúdo principal
      </h2>

      <p class="focus-content-text">
        Use esta área para exibir a atividade principal: uma questão, uma tarefa, uma anotação, um timer ou um conteúdo de estudo.
      </p>
    </div>

    <div class="focus-feedback">
      Feedback da ação atual, status ou orientação rápida.
    </div>

    <div class="focus-actions">
      <button class="btn btn-primary btn-lg" type="button">
        Ação principal
      </button>
    </div>
  </main>

  <footer class="focus-secondary-actions">
    <button class="btn btn-secondary" type="button">
      Voltar
    </button>

    <button class="btn btn-outline" type="button">
      Pausar
    </button>

    <button class="btn btn-ghost" type="button">
      Finalizar
    </button>
  </footer>
</section>

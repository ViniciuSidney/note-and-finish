<!--
  Layout: L25 - Empty State
  Uso: tela sem dados, busca sem resultados ou primeiro uso de um módulo.
-->

<section class="layout-empty-state">
  <div class="empty-state">
    <div class="empty-state-icon" aria-hidden="true">
      📭
    </div>

    <h1 class="empty-state-title">
      Nenhum conteúdo encontrado
    </h1>

    <p class="empty-state-description">
      Ainda não há registros para exibir. Comece criando o primeiro item para preencher esta área.
    </p>

    <div class="empty-state-actions">
      <button class="btn btn-primary" type="button">
        Criar primeiro item
      </button>

      <button class="btn btn-ghost" type="button">
        Ver orientações
      </button>
    </div>

    <p class="empty-state-note">
      Esta mensagem pode ser adaptada para tarefas, matérias, questões, anotações, histórico ou resultados de busca.
    </p>
  </div>
</section>
